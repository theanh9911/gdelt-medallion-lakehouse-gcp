version: '3.8'
x-airflow-common:
  &airflow-common
  build: .
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__LOGGING_LEVEL: WARNING
    # Khóa bảo mật của Webserver
    AIRFLOW__WEBSERVER__SECRET_KEY: "super_secret_key_for_local_dev"
    # Cho phép sử dụng tính năng kiểm thử kết nối (Test Connection) trên giao diện Webserver
    AIRFLOW__CORE__TEST_CONNECTION: "Enabled"
  volumes:
    # Gắn thư mục code từ máy bạn vào bên trong Container Airflow
    - ../dags:/opt/airflow/dags
    - ../scripts:/opt/airflow/scripts
    - ../data:/opt/airflow/data
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  # Cấu hình Cơ sở dữ liệu Postgres chứa Metadata của Airflow
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # Cấu hình Airflow Webserver (Giao diện quản lý GUI)
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always

  # Cấu hình Airflow Scheduler (Bộ lập lịch chạy ngầm)
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

  # Cấu hình Task khởi tạo cơ sở dữ liệu ban đầu
  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow
    user: "0:0"

volumes:
  postgres-db-volume:
